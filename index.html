<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNEB Jurisdiction Finder | Find Tamil Nadu Electricity Office & Boundaries</title>
    <meta name="description"
        content="Instantly find your TNEB Section Office and jurisdiction boundary with 100% precision using our Unified Administrative Index and mapping engine.">
    <meta name="keywords" content="TNEB, Tamil Nadu Electricity, Section Finder, Consumer Number Lookup, TNEB Jurisdiction, EB Office Locator, TANGEDCO, Administrative Index, TNEB GIS">
    <link rel="canonical" href="https://tneb-section.web.app/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tneb-section.web.app/">
    <meta property="og:title" content="TNEB Jurisdiction Finder">
    <meta property="og:description" content="Find your exact TNEB electricity jurisdiction and nearest office using real-time GIS data.">
    <meta property="og:image" content="https://tneb-section.web.app/preview.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tneb-section.web.app/">
    <meta property="twitter:title" content="TNEB Jurisdiction Finder">
    <meta property="twitter:description" content="Find your exact TNEB electricity jurisdiction and nearest office using real-time GIS data.">
    <meta property="twitter:image" content="https://tneb-section.web.app/preview.png">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body class="dark-mode">
    <div id="app">
        <!-- Map Container -->
        <div id="map"></div>

        <!-- Floating UI Overlays -->
        <header class="glass-panel main-header">
            <div class="logo">
                <i data-lucide="zap" class="icon-primary"></i>
                <h1>TNEB Jurisdiction</h1>
            </div>
            <p class="subtitle">Finder Service</p>
        </header>

        <!-- Search / Info Panel -->
        <aside class="side-panel" id="side-panel">
            <div class="drag-handle" id="drag-handle"></div>

            <!-- Consumer Number Search -->
            <div class="glass-panel consumer-search-container">
                <div class="search-input-group">
                    <i data-lucide="zap" class="icon-primary"></i>
                    <input type="text" id="consumer-number" placeholder="Enter your consumer number" autocomplete="off">
                    <button id="consumer-search-btn" class="search-action-btn" title="Search by Consumer Number">
                        <i data-lucide="search"></i>
                    </button>
                </div>
            </div>

            <!-- Start Card (Choice Screen) -->

            <div id="start-panel" class="glass-panel start-card">
                <h2>Find Your Jurisdiction</h2>
                <p>Select how you want to find your electricity section</p>
                <div class="start-actions">
                    <button id="main-gps-btn" class="primary-btn">
                        <i data-lucide="locate"></i>
                        <span>Use My Location</span>
                    </button>
                    <button id="explore-btn" class="secondary-btn">
                        <i data-lucide="map"></i>
                        <span>Explore on Map</span>
                    </button>
                </div>
            </div>

            <div id="results-panel" class="results-container hidden">
                <!-- Selected Location Header will go here -->
                <!-- Data will be injected here -->
            </div>
        </aside>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="overlay">
            <div class="glass-panel loader-card">
                <div class="spinner"></div>
                <h2>Initializing GIS Engine</h2>
                <p>Indexing boundaries and offices for high performance...</p>
            </div>
        </div>

        <div id="status-toast" class="status-toast hidden">
            <i data-lucide="locate" class="icon-pulse"></i>
            <span id="status-text">Detecting Location...</span>
        </div>

        <button id="fab-gps" class="fab hidden" title="Use My Location">
            <i data-lucide="locate"></i>
        </button>
    </div>

    <!-- Scripts -->
    <script src="main.js" type="module"></script>
</body>

</html>
